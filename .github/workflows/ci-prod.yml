name: CI/CD - Production

on:
  push:
    branches: [prod]
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1

jobs:
  # ── Manual approval gate before anything runs ─────────────────────────────
  approval:
    name: Await Production Approval
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Production deployment approved"

  # ── Determine version from git tag ────────────────────────────────────────
  get-version:
    name: Get Version Tag
    runs-on: ubuntu-latest
    needs: approval
    outputs:
      version: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from git tag
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying version: $TAG"

  # ── Build all 5 services in parallel with version tag ─────────────────────
  build:
    name: Build & Push - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: get-version
    strategy:
      matrix:
        include:
          - service: auth
            dockerfile: services/auth-service/Dockerfile
            ecr_repo: agriconnect-auth
          - service: marketplace
            dockerfile: services/marketplace-service/Dockerfile
            ecr_repo: agriconnect-marketplace
          - service: order
            dockerfile: services/order-service/Dockerfile
            ecr_repo: agriconnect-order
          - service: media
            dockerfile: services/media-service/Dockerfile
            ecr_repo: agriconnect-media
          - service: notification
            dockerfile: services/notification-service/Dockerfile
            ecr_repo: agriconnect-notification

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & Push to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.ecr_repo }}:${{ needs.get-version.outputs.version }}
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.ecr_repo }}:stable
          cache-from: type=gha,scope=${{ matrix.service }}-prod
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-prod

  # ── Update helm prod branch → ArgoCD syncs to production namespace ─────────
  update-helm-prod:
    name: Update Helm prod branch
    runs-on: ubuntu-latest
    needs: [get-version, build]
    steps:
      - name: Checkout helm repo (prod branch)
        uses: actions/checkout@v4
        with:
          repository: agriconnect-platform/agriconnect-helm
          token: ${{ secrets.GH_PAT }}
          ref: prod
          path: helm-repo

      - name: Update image tags to version
        run: |
          VERSION=${{ needs.get-version.outputs.version }}
          sed -i "s/^\( *tag:\) .*/\1 ${VERSION}/" helm-repo/helm/agriconnect/values.yaml

      - name: Commit and push to prod branch
        run: |
          VERSION=${{ needs.get-version.outputs.version }}
          cd helm-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/agriconnect/values.yaml
          git diff --staged --quiet || git commit -m "ci: deploy ${VERSION} to production [skip ci]"
          git push origin prod
