name: Notify - Scan Failure

on:
  workflow_call:
    inputs:
      scan_name:
        required: true
        type: string
    secrets:
      TF_VAR_SMTP_PASS:
        required: true

jobs:
  notify:
    name: Send failure email
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: asadchamp109@gmail.com
          password: ${{ secrets.TF_VAR_SMTP_PASS }}
          subject: "❌ AgriConnect CI — ${{ inputs.scan_name }} FAILED"
          to: asadchamp109@gmail.com
          from: AgriConnect CI <asadchamp109@gmail.com>
          body: |
            ============================================
              AgriConnect Platform — CI Security Alert
            ============================================

            STATUS  : ❌ FAILED
            SCAN    : ${{ inputs.scan_name }}

            --------------------------------------------
            PIPELINE DETAILS
            --------------------------------------------
            Branch  : ${{ github.ref_name }}
            Commit  : ${{ github.sha }}
            Trigger : ${{ github.actor }}
            Run #   : ${{ github.run_number }}

            --------------------------------------------
            ACTION REQUIRED
            --------------------------------------------
            Review the scan results and fix any issues
            before merging to production.

            View full run:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ============================================
            AgriConnect DevSecOps Pipeline
            ============================================
