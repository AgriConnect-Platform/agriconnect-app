name: CI Pipeline

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  # ── Detect which paths changed ────────────────────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'

  # ── Lint — ESLint code quality gate ─────────────────────────────────────
  lint:
    name: Lint - ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint all services
        run: |
          npx eslint@8 \
            services/auth-service \
            services/marketplace-service \
            services/order-service \
            services/media-service \
            services/notification-service \
            shared \
            --ext .js \
            --max-warnings 0

  # ── Build all 5 services in PARALLEL ─────────────────────────────────────
  ci-auth:
    needs: lint
    uses: ./.github/workflows/ci-auth.yml
    secrets: inherit

  ci-marketplace:
    needs: lint
    uses: ./.github/workflows/ci-marketplace.yml
    secrets: inherit

  ci-order:
    needs: lint
    uses: ./.github/workflows/ci-order.yml
    secrets: inherit

  ci-media:
    needs: lint
    uses: ./.github/workflows/ci-media.yml
    secrets: inherit

  ci-notification:
    needs: lint
    uses: ./.github/workflows/ci-notification.yml
    secrets: inherit

  # ── SAST — SonarCloud (runs in parallel, never blocks deployment) ──────────
  sast:
    name: SAST - SonarCloud
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.sonar.outcome }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        id: sonar
        uses: SonarSource/sonarcloud-github-action@v3
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >-
            -Dsonar.qualitygate.wait=false

  # ── Snyk — runs after SonarCloud ─────────────────────────────────────────
  snyk:
    name: Snyk - Dependency Scan
    needs: sast
    if: always()
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.snyk-scan.outcome }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Install dependencies
        run: |
          for dir in shared services/auth-service services/marketplace-service services/order-service services/media-service services/notification-service; do
            (cd $dir && npm install --omit=dev 2>/dev/null)
          done

      - name: Run Snyk scan
        id: snyk-scan
        run: snyk test --all-projects --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

  # ── Notify on any security scan failure ───────────────────────────────────
  notify-security:
    name: Notify - Security Scan Failed
    needs: [sast, snyk]
    if: always() && (needs.sast.outputs.result == 'failure' || needs.snyk.outputs.result == 'failure')
    uses: ./.github/workflows/notify-failure.yml
    secrets: inherit
    with:
      scan_name: "${{ needs.sast.outputs.result == 'failure' && needs.snyk.outputs.result == 'failure' && 'SonarCloud SAST + Snyk' || needs.sast.outputs.result == 'failure' && 'SonarCloud SAST' || 'Snyk Dependency Scan' }}"

  # ── Update image tags in agriconnect-helm repo → triggers ArgoCD sync ────
  update-helm-values:
    name: Update image tags in Helm repo
    needs: [ci-auth, ci-marketplace, ci-order, ci-media, ci-notification]
    if: always() && needs.ci-auth.result == 'success' && needs.ci-marketplace.result == 'success' && needs.ci-order.result == 'success' && needs.ci-media.result == 'success' && needs.ci-notification.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout helm repo
        uses: actions/checkout@v4
        with:
          repository: agriconnect-platform/agriconnect-helm
          token: ${{ secrets.GH_PAT }}
          ref: dev
          path: helm-repo

      - name: Update image tags
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s/^\( *tag:\) .*/\1 ${SHA}/" helm-repo/helm/agriconnect/values.yaml

      - name: Commit and push
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cd helm-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/agriconnect/values.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${SHA} [skip ci]"
          git push origin dev

  # ── Deploy frontend — only when frontend files changed ────────────────────
  cd-frontend:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    uses: ./.github/workflows/cd-frontend.yml
    secrets: inherit
