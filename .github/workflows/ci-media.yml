name: CI - Media Service

on:
  workflow_call:

env:
  AWS_REGION: ap-south-1
  SERVICE: media
  CONTEXT: .
  DOCKERFILE: services/media-service/Dockerfile
  ECR_REPO: agriconnect-media

jobs:
  build:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "full_image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:${SHA}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: false
          load: true
          tags: ${{ steps.tag.outputs.full_image }}
          cache-from: type=gha,scope=${{ env.SERVICE }}
          cache-to: type=gha,mode=max,scope=${{ env.SERVICE }}

      - name: Scan with Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy image --severity CRITICAL --exit-code 1 --ignore-unfixed ${{ steps.tag.outputs.full_image }}

      - name: Smoke test — verify /healthz responds
        run: |
          docker run -d \
            -e PORT=3001 \
            -p 3001:3001 \
            --name smoke-${{ env.SERVICE }} \
            ${{ steps.tag.outputs.full_image }}

          echo "Waiting for /healthz..."
          for i in $(seq 1 20); do
            RESP=$(curl -sf http://localhost:3001/healthz 2>/dev/null || true)
            if [ -n "$RESP" ]; then
              echo "$RESP"
              echo "Smoke test passed!"
              docker rm -f smoke-${{ env.SERVICE }} || true
              exit 0
            fi
            sleep 1
          done
          echo "FAILED: /healthz did not respond in 20s"
          docker logs smoke-${{ env.SERVICE }} 2>/dev/null || true
          docker rm -f smoke-${{ env.SERVICE }} || true
          exit 1

      - name: Push to ECR
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: |
            ${{ steps.tag.outputs.full_image }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
          cache-from: type=gha,scope=${{ env.SERVICE }}
